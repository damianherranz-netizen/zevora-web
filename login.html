<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FisioIA — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0B1F3A;--green:#00C896;--green2:#00A07A;
  --surface:#111827;--surface2:#1A2535;--surface3:#1F2D40;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#F0F4F8;--muted:#64748B;--muted2:#94A3B8;--red:#EF4444;
  --font:'Plus Jakarta Sans',sans-serif;
}
body{font-family:var(--font);background:var(--surface);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.bg-blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.blob1{width:400px;height:400px;background:rgba(0,200,150,0.06);top:-100px;right:10%;}
.blob2{width:300px;height:300px;background:rgba(11,31,58,0.8);bottom:-50px;left:5%;}

.login-box{position:relative;z-index:1;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,0.4);}

.logo-area{text-align:center;margin-bottom:32px;}
.logo-area .brand{font-size:28px;font-weight:900;color:var(--text);}
.logo-area .brand span{color:var(--green);}
.logo-area .sub{font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-top:4px;font-weight:600;}
.logo-area .tagline{font-size:13px;color:var(--muted2);margin-top:12px;}

.form-group{margin-bottom:16px;}
.form-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);display:block;margin-bottom:6px;}
.form-input{width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:14px;color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--green);}
.form-input::placeholder{color:var(--muted);}

.btn-login{width:100%;background:var(--green);color:var(--navy);border:none;padding:14px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);transition:all 0.2s;margin-top:8px;}
.btn-login:hover{background:var(--green2);transform:translateY(-1px);}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:16px;display:none;}
.error-msg.show{display:block;}

.forgot-link{text-align:center;margin-top:16px;}
.forgot-link a{font-size:12px;color:var(--muted2);text-decoration:none;transition:color 0.2s;}
.forgot-link a:hover{color:var(--green);}

.divider{height:1px;background:var(--border);margin:24px 0;}
.back-link{text-align:center;font-size:12px;color:var(--muted2);}
.back-link a{color:var(--green);text-decoration:none;font-weight:600;}
</style>
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>

<div class="login-box">
  <div class="logo-area">
    <div class="brand">Fisio<span>IA</span></div>
    <div class="sub">by ZEVORA Systems</div>
    <div class="tagline">Accede a tu panel de clínica</div>
  </div>

  <div class="error-msg" id="error-msg">Email o contraseña incorrectos. Por favor inténtalo de nuevo.</div>

  <form id="login-form">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="login-email" placeholder="tu@clinica.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-input" id="login-password" placeholder="Tu contraseña" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login" id="btn-login">
      <span id="btn-text">Entrar al dashboard →</span>
    </button>
  </form>

  <div class="forgot-link">
    <a href="mailto:fisioia@zevorasystems.com?subject=Recuperar%20contraseña%20FisioIA">¿Olvidaste tu contraseña? Escríbenos</a>
  </div>

  <div class="divider"></div>
  <div class="back-link">¿Aún no tienes cuenta? <a href="registro-fisioia.html">Registrarse →</a></div>
</div>

<script>
var SUPABASE_URL = 'https://epkqgsodpctnlkeclndf.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwa3Fnc29kcGN0bmxrZWNsbmRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTMzMjksImV4cCI6MjA5MTY4OTMyOX0.MCkWgWj8z4K4LPYt708NovaIDKZBCHkjQigCV9E9o_E';

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;
  var btn = document.getElementById('btn-login');
  var btnText = document.getElementById('btn-text');
  var errorMsg = document.getElementById('error-msg');

  btn.disabled = true;
  btnText.textContent = 'Entrando...';
  errorMsg.classList.remove('show');

  try {
    var res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON
      },
      body: JSON.stringify({ email: email, password: password })
    });

    var data = await res.json();

    if (data.access_token) {
      // Guardar sesión
      sessionStorage.setItem('fisioia_token', data.access_token);
      sessionStorage.setItem('fisioia_user', JSON.stringify(data.user));
      // Obtener clinica_id del metadata
      var clinicaId = data.user.user_metadata && data.user.user_metadata.clinica_id;
      if (clinicaId) {
        sessionStorage.setItem('fisioia_clinica_id', clinicaId);
      }
      window.location.href = 'dashboard.html';
    } else {
      errorMsg.classList.add('show');
      btn.disabled = false;
      btnText.textContent = 'Entrar al dashboard →';
    }
  } catch(err) {
    errorMsg.textContent = 'Error de conexión. Por favor inténtalo de nuevo.';
    errorMsg.classList.add('show');
    btn.disabled = false;
    btnText.textContent = 'Entrar al dashboard →';
  }
});
</script>
</body>
</html>
